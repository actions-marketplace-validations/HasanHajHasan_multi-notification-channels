# Example: how to use the multi-channel-notification action
# Copy this file into the repo where you want notifications.

name: CI with Notifications

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: echo "Your build step here"

      - name: Test
        run: echo "Your test step here"

      # ── Notify on every outcome ──────────────────────────────────────────────
      - name: Send notification
        uses: HasanHajHasan/multi-channel-notification-node@v1
        if: always()
        with:
          status:   ${{ job.status }}
          channels: slack,telegram        # add/remove channels as needed

          # Store URLs in repo/org secrets
          slack_url:    ${{ secrets.SLACK_URL }}
          telegram_url: ${{ secrets.TELEGRAM_URL }}

          # Optional: discord_url, teams_url, gchat_url, email_url,
          #           sns_url, gotify_url, ntfy_url, webhook_url
