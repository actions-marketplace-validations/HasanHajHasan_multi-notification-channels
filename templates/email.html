<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{TITLE}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .wrapper {
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      padding: 24px 28px;
      border-radius: 10px 10px 0 0;
      color: #fff;
    }
    .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
    .header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .header p {
      margin: 6px 0 0;
      font-size: 13px;
      opacity: 0.85;
    }
    .card {
      background: #fff;
      padding: 24px 28px;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .row {
      display: flex;
      align-items: flex-start;
      padding: 9px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .row:last-of-type { border-bottom: none; }
    .label {
      width: 110px;
      min-width: 110px;
      font-weight: 600;
      color: #666;
    }
    .value { color: #222; word-break: break-all; }
    .code {
      background: #f4f4f5;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 12px;
      color: #d63384;
    }
    .btn {
      display: inline-block;
      margin-top: 22px;
      padding: 12px 26px;
      background: #4f46e5;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
    }
    .footer {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>{TITLE}</h1>
    </div>
    <div class="card">
      <p style="white-space: pre-wrap; font-size: 14px; color: #222; margin: 0;">{MESSAGE}</p>
    </div>
    <div class="footer">
      This is an automated notification.
    </div>
  </div>
</body>
</html>
